name: Build & Release WebSSH

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉代码
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PERSONAL_TOKEN }}

      # 2. 生成版本号（UTC+8）
      - name: Generate version
        id: version
        run: |
          VERSION=$(TZ=Asia/Shanghai date +%Y%m%d_%H%M%S)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "当前版本: $VERSION"

      # 3. Node 环境
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 26

      # 4. 构建前端
      - name: Build webssh
        run: |
          cd webssh
          npm install
          npm run buildOnly

      # 5. 拷贝 dist → webroot
      - name: Prepare webroot
        run: |
          rm -rf gossh/webroot/*
          mkdir -p gossh/webroot
          cp -r webssh/dist/* gossh/webroot/

      # 6. Go 环境
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      # 7. 构建 Go（二进制 + 内嵌版本）
      - name: Build Go binary
        run: |
          cd gossh

          export CGO_ENABLED=0
          export GOOS=linux
          export GOARCH=arm64

          go env -w GOPROXY=https://goproxy.cn,direct
          go mod tidy

          go build -trimpath -ldflags="-s -w -X main.version=${VERSION}" -o webssh_${VERSION}

      # 8. UPX 压缩（可选）
      - name: Install UPX
        run: sudo apt-get update && sudo apt-get install -y upx-ucl

      - name: Compress binary
        run: |
          cd gossh
          upx --best --lzma webssh_${VERSION} || true

      # 9. 生成 version.txt 到仓库根目录
      - name: Generate version file
        run: |
          echo "${VERSION}" > version.txt

      # 10. 提交 version.txt 到当前分支根目录
      - name: Commit version.txt
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add version.txt
          git commit -m "chore: update version.txt to ${VERSION} [skip ci]" || echo "version.txt 没有变化，跳过提交"

          git push origin HEAD:${GITHUB_REF_NAME}

      # 11. 创建 Release（直接上传原始文件）
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          files: |
            gossh/webssh_${{ steps.version.outputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.PERSONAL_TOKEN }}
